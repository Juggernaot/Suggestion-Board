<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; font-family: Arial, sans-serif; }
body { background: #fff; padding: 4px; font-size: 12px; }
.team-detected b { font-size: 16px; color: #0040ff; }
.team-detected { font-size: 10px; color: #555; margin-bottom: 3px; }
textarea { width: 100%; font-size: 11px; border: 1px solid #ccc; border-radius: 3px; padding: 3px 5px; margin-bottom: 3px; background: #fff; color: #000; min-height: 40px; max-height: 45px; resize: none; }
.submit-btn { display: block; width: 50%; margin: 0 auto; font-size: 11px; font-weight: bold; background: #0040ff; color: #fff; border: none; border-radius: 3px; padding: 5px; cursor: pointer; }
.submit-btn:hover { background: #0030cc; }
.status { font-size: 10px; color: #555; text-align: center; min-height: 14px; }
.feed-label { font-size: 9px; color: #888; font-weight: bold; text-transform: uppercase; letter-spacing: 0.05em; margin: 5px 0 3px; }
.post { border-bottom: 1px solid #eee; padding: 4px 0; }

  .post-header { display: flex; justify-content: flex-start; gap: 8px; margin-bottom: 1px; align-items: center; }
.post-team { font-weight: bold; color: #0040ff; font-size: 12px; }
.post-time { font-size: 10px; color: #aaa; }
.post-text { font-size: 13px; font-weight: bold; color: #333; line-height: 1.3; }
.like-btn { background: none; border: 1px solid #e0e0e0; border-radius: 10px; padding: 1px 6px; font-size: 11px; cursor: pointer; margin-top: 3px; color: #555; }
.like-btn:hover { background: #f0f0f0; }
.empty { font-size: 11px; color: #aaa; text-align: center; padding: 8px; }
</style>
</head>
<body>

<p class="team-detected" id="teamLabel">Detecting...</p>
<textarea id="postText" placeholder="Type a suggestion..."></textarea>
<button class="submit-btn" onclick="submitPost()">Submit</button>
<p class="status" id="status"></p>
<p class="feed-label">Suggestions</p>
<div id="feed"><p class="empty">Loading...</p></div>

<script>
const BIN_ID = '6a234cabda38895dfe8eb553';
const MASTER_KEY = '$2a$10$MRejZz/frOMmyK.Z/GCOlOk9Eoq3nMeBJfnCZCneym71sw28DsyzO';
const ACCESS_KEY = '$2a$10$x5zU4CA2F5A5qObO/wOkg.HkKFBITwKSG4nqav2ZbPSr403035jXG';
const API_URL = 'https://api.jsonbin.io/v3/b/' + BIN_ID;

const params = new URLSearchParams(window.location.search);
let detectedTeam = params.get('team') || 'Unknown Team';
document.getElementById('teamLabel').innerHTML = 'Posting as: <b>' + detectedTeam + '</b>';

function timeAgo(ts) {
  const d = Math.floor((Date.now() - ts) / 1000);
  if (d < 60) return 'just now';
  if (d < 3600) return Math.floor(d/60) + 'm ago';
  if (d < 86400) return Math.floor(d/3600) + 'h ago';
  return Math.floor(d/86400) + 'd ago';
}

async function loadPosts() {
  try {
    const r = await fetch(API_URL + '/latest', {
      headers: { 'X-Master-Key': MASTER_KEY, 'X-Access-Key': ACCESS_KEY }
    });
    const data = await r.json();
    return data.record.posts || [];
  } catch(e) { return []; }
}

async function savePosts(posts) {
  await fetch(API_URL, {
    method: 'PUT',
    headers: {
      'Content-Type': 'application/json',
      'X-Master-Key': MASTER_KEY,
      'X-Access-Key': ACCESS_KEY
    },
    body: JSON.stringify({ posts })
  });
}

function renderFeed(posts) {
  const feed = document.getElementById('feed');
  if (!posts.length) { feed.innerHTML = '<p class="empty">No suggestions yet.</p>'; return; }
  feed.innerHTML = posts.slice().reverse().map((p, ri) => {
    const i = posts.length - 1 - ri;
    const likes = p.likes || 0;
    return `
       <div class="post">
        <div class="post-header">
          <span class="post-team">${p.team}</span>
          <button class="like-btn" onclick="likePost(${i})">👍 ${likes}</button>
          <span class="post-time">${timeAgo(p.ts)}</span>
        </div>
        <p class="post-text">${p.text}</p>
      </div>
    `;
  }).join('');
}

async function submitPost() {
  const text = document.getElementById('postText').value.trim();
  const status = document.getElementById('status');
  if (!text) { status.textContent = 'Please enter a suggestion.'; return; }
  status.textContent = 'Posting...';
  const posts = await loadPosts();
  posts.push({ team: detectedTeam, text, ts: Date.now(), likes: 0 });
  await savePosts(posts);
  document.getElementById('postText').value = '';
  status.textContent = 'Posted!';
  setTimeout(() => status.textContent = '', 2000);
  renderFeed(posts);
}

async function likePost(index) {
  const posts = await loadPosts();
  posts[index].likes = (posts[index].likes || 0) + 1;
  await savePosts(posts);
  renderFeed(posts);
}

loadPosts().then(renderFeed);
</script>
</body>
</html>
